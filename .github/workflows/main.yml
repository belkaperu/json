- name: Subir el archivo JSON actualizado al repositorio
      run: |
        git config --global user.name "Agenda Bot"
        git config --global user.email "bot@agenda.com"
        git add agenda_combinada.json
        
        # Comprobamos si hay cambios reales en el JSON
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Agenda actualizada automáticamente"
          
          # SOLUCIÓN: Hace un pull con rebase por si tú subiste algo mientras el bot corría
          git pull --rebase origin main
          
          # Sube los cambios de forma segura
          git push origin main
        else
          echo "No hay cambios nuevos en la agenda para subir."
        fi
